<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voyage Ledger</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Core functionality) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (To translate the React code inside the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Canvas Confetti for Celebration Animation -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Custom scrollbar hiding utility */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth transitions */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Beautiful Custom Checkbox */
        .task-checkbox {
            appearance: none;
            background-color: #f8fafc;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.4em;
            height: 1.4em;
            border: 2px solid #cbd5e1;
            border-radius: 0.35em;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            flex-shrink: 0;
        }
        .task-checkbox::before {
            content: "";
            width: 0.75em;
            height: 0.75em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: transparent;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .task-checkbox:checked {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
        }
        .task-checkbox:checked::before {
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    <!-- The app will be injected here -->
    <div id="root"></div>

    <!-- React Application Code -->
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- CONSTANTS & CONFIG ---
        const DATES = [
          { id: '2025-06-04', label: 'Day 1: June 4', desc: 'Arrival & Check-in' },
          { id: '2025-06-05', label: 'Day 2: June 5', desc: 'Main Exploration' },
          { id: '2025-06-06', label: 'Day 3: June 6', desc: 'Departure' },
        ];

        const CATEGORIES = [
          { id: 'HOTEL', label: 'Hotel & Stay', icon: 'fa-hotel', color: 'text-indigo-500', bg: 'bg-indigo-100' },
          { id: 'CAR', label: 'Shared Car', icon: 'fa-car', color: 'text-sky-500', bg: 'bg-sky-100' },
          { id: 'TRAIN', label: 'Train Ticket', icon: 'fa-train', color: 'text-emerald-500', bg: 'bg-emerald-100' },
          { id: 'FOOD', label: 'Food & Drinks', icon: 'fa-utensils', color: 'text-orange-500', bg: 'bg-orange-100' },
          { id: 'MISC', label: 'Miscellaneous', icon: 'fa-ellipsis-h', color: 'text-slate-500', bg: 'bg-slate-100' },
        ];

        const SPLIT_TYPES = [
          { id: 'ALL', label: 'Full Group (All 10)' },
          { id: 'TRAIN_GROUP', label: 'Train Passengers (8 Pax)' },
          { id: 'DIRECT_GROUP', label: 'Direct Route (2 Pax)' },
          { id: 'INDIVIDUAL', label: 'Individual (Just Me)' },
        ];

        const ITINERARY = {
          '2025-06-04': [
            { id: 'd1_1', text: 'Pickup & transfer to Takdah' },
            { id: 'd1_2', text: 'Visit Selfie Dara View Point' },
            { id: 'd1_3', text: 'Explore Teesta Valley Tea Garden' },
            { id: 'd1_4', text: 'Visit Rangli Rangliot Tea Garden' },
            { id: 'd1_5', text: 'Tour Takdah Orchid Centre' },
            { id: 'd1_6', text: 'Check-in at Takdah Pine View Homestay' },
          ],
          '2025-06-05': [
            { id: 'd2_1', text: 'Breakfast & checkout' },
            { id: 'd2_2', text: 'Transfer to Dawaipani' },
            { id: 'd2_3', text: 'Kanchenjunga view from Tinchuley Gumbadara' },
            { id: 'd2_4', text: 'Explore Peshoke Tea Garden' },
            { id: 'd2_5', text: 'Stop at Lovers Meet View Point' },
            { id: 'd2_6', text: 'Relax at Lamahatta Eco Park' },
            { id: 'd2_7', text: 'Check-in at Dawaipani Homestay' },
          ],
          '2025-06-06': [
            { id: 'd3_1', text: 'Checkout & depart for NJP' },
            { id: 'd3_2', text: 'Drive via Rambi River' },
            { id: 'd3_3', text: 'Visit Rhododendron Park (Sittong)' },
            { id: 'd3_4', text: 'Tour Rabindra Museum (Mungpoo)' },
            { id: 'd3_5', text: 'Final Drop-off at NJP Railway Station' },
          ]
        };

        // Helper to evaluate math strings safely
        const evaluateMath = (str) => {
          try {
            const sanitized = String(str).replace(/[^\d.+\-*/()]/g, '');
            const result = sanitized ? Function(`'use strict'; return (${sanitized})`)() : 0;
            return result ? Math.round(result * 100) / 100 : 0;
          } catch (e) {
            return 0;
          }
        };

        // --- MAIN APPLICATION COMPONENT ---
        function App() {
          const [activeTab, setActiveTab] = useState('home'); 
          const [selectedDate, setSelectedDate] = useState(DATES[0].id);
          const [congratsDay, setCongratsDay] = useState(null);

          // User Profile Type
          const [userType, setUserType] = useState(() => localStorage.getItem('aspen_user_type') || null);
          const [showProfileModal, setShowProfileModal] = useState(false);

          // Show Profile selection modal ONLY when navigating to the Tracker tab for the first time
          useEffect(() => {
            if (activeTab === 'tracker' && !userType) {
              setShowProfileModal(true);
            }
          }, [activeTab, userType]);

          // LocalStorage for Budget Limit
          const [budgetLimit, setBudgetLimit] = useState(() => {
            const saved = localStorage.getItem('aspen_budget');
            return saved ? Number(saved) : 5500;
          });
          
          // LocalStorage for Expenses (Starts empty so we can properly inject defaults later)
          const [expenses, setExpenses] = useState(() => {
            const saved = localStorage.getItem('aspen_expenses');
            if (saved && saved !== '[]') return JSON.parse(saved);
            return [];
          });

          // LocalStorage for Completed Tasks
          const [completedTasks, setCompletedTasks] = useState(() => {
            const saved = localStorage.getItem('aspen_tasks');
            if (saved) return JSON.parse(saved);
            return [];
          });

          // Auto-save to LocalStorage whenever data changes
          useEffect(() => { localStorage.setItem('aspen_budget', budgetLimit.toString()); }, [budgetLimit]);
          useEffect(() => { localStorage.setItem('aspen_expenses', JSON.stringify(expenses)); }, [expenses]);
          useEffect(() => { localStorage.setItem('aspen_tasks', JSON.stringify(completedTasks)); }, [completedTasks]);

          const renderView = () => {
            switch (activeTab) {
              case 'home': return <HomeView budgetLimit={budgetLimit} setBudgetLimit={setBudgetLimit} userType={userType} setShowProfileModal={setShowProfileModal} />;
              case 'calendar': return <CalendarView onSelectDate={(date) => { setSelectedDate(date); setActiveTab('tracker'); }} completedTasks={completedTasks} setCompletedTasks={setCompletedTasks} setCongratsDay={setCongratsDay} />;
              case 'tracker': return <TrackerView expenses={expenses} setExpenses={setExpenses} selectedDate={selectedDate} setSelectedDate={setSelectedDate} />;
              case 'dashboard': return <DashboardView expenses={expenses} budgetLimit={budgetLimit} />;
              default: return <HomeView budgetLimit={budgetLimit} setBudgetLimit={setBudgetLimit} userType={userType} setShowProfileModal={setShowProfileModal} />;
            }
          };

          return (
            <div className="min-h-screen pb-24">
              {/* Header */}
              <header className="bg-slate-900 text-white p-6 shadow-lg rounded-b-3xl">
                <h1 className="text-2xl font-bold tracking-tight text-center">AWBY Smart App</h1>
                <p className="text-slate-400 text-sm text-center mt-1">Smart Trip & Expense Manager</p>
              </header>

              {/* Main Content */}
              <main className="max-w-md mx-auto p-4 mt-2 fade-in relative">
                {renderView()}
              </main>

              {/* Profile Selection Modal */}
              {showProfileModal && (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                  <div className="bg-white rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
                    <div className="w-16 h-16 bg-sky-100 rounded-full flex items-center justify-center mx-auto mb-4">
                      <i className="fa-solid fa-user-group text-2xl text-sky-500"></i>
                    </div>
                    <h2 className="text-xl font-bold text-slate-800 mb-2">Select Your Profile</h2>
                    <p className="text-slate-500 text-sm mb-6">This sets up your personal tracker defaults.</p>
                    
                    <div className="space-y-3">
                      <button 
                        onClick={() => {
                          setUserType('TRAIN_GROUP');
                          localStorage.setItem('aspen_user_type', 'TRAIN_GROUP');
                          
                          setExpenses(prev => {
                            let next = [...prev];
                            // Always ensure default hotel exists
                            if (!next.some(e => e.id === 'default_hotel')) {
                              next.push({ id: 'default_hotel', date: '2025-06-04', category: 'HOTEL', description: 'Hotel Advance Paid', amount: 500, splitType: 'INDIVIDUAL' });
                            }
                            // Add default train ticket if missing
                            if (!next.some(e => e.id === 'default_train')) {
                              next.push({ id: 'default_train', date: '2025-06-04', category: 'TRAIN', description: 'Malda to NJP back to Malda Tickets', amount: 420, splitType: 'INDIVIDUAL' });
                            }
                            return next;
                          });
                          setShowProfileModal(false);
                        }}
                        className={`w-full p-4 rounded-xl border-2 transition-colors flex items-center justify-between ${userType === 'TRAIN_GROUP' ? 'border-sky-500 bg-sky-50' : 'border-slate-200 hover:border-sky-300'}`}
                      >
                        <span className="font-bold text-slate-700"><i className="fa-solid fa-train text-emerald-500 w-6"></i> Train Pass. (8 Pax)</span>
                        {userType === 'TRAIN_GROUP' && <i className="fa-solid fa-circle-check text-sky-500"></i>}
                      </button>
                      
                      <button 
                        onClick={() => {
                          setUserType('DIRECT_GROUP');
                          localStorage.setItem('aspen_user_type', 'DIRECT_GROUP');
                          
                          setExpenses(prev => {
                            // Filter out the default train ticket completely
                            let next = prev.filter(e => e.id !== 'default_train');
                            // Ensure default hotel still exists
                            if (!next.some(e => e.id === 'default_hotel')) {
                              next.push({ id: 'default_hotel', date: '2025-06-04', category: 'HOTEL', description: 'Hotel Advance Paid', amount: 500, splitType: 'INDIVIDUAL' });
                            }
                            return next;
                          });
                          setShowProfileModal(false);
                        }}
                        className={`w-full p-4 rounded-xl border-2 transition-colors flex items-center justify-between ${userType === 'DIRECT_GROUP' ? 'border-sky-500 bg-sky-50' : 'border-slate-200 hover:border-sky-300'}`}
                      >
                        <span className="font-bold text-slate-700"><i className="fa-solid fa-car text-sky-500 w-6"></i> Direct Route (2 Pax)</span>
                        {userType === 'DIRECT_GROUP' && <i className="fa-solid fa-circle-check text-sky-500"></i>}
                      </button>
                    </div>
                    
                    {userType && (
                      <button onClick={() => setShowProfileModal(false)} className="mt-5 text-slate-400 hover:text-slate-600 text-sm font-semibold">
                        Cancel
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* Celebration Modal Overlay */}
              {congratsDay && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm fade-in">
                  <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-100 transition-transform">
                    <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                      <i className="fa-solid fa-champagne-glasses text-4xl text-emerald-500"></i>
                    </div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-2">Yaaay! Congratulations! 🎉</h2>
                    <p className="text-slate-500 mb-6">You have successfully completed all tasks and locations for {DATES.find(d => d.id === congratsDay)?.label}!</p>
                    <button 
                      onClick={() => setCongratsDay(null)}
                      className="w-full py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-md transition-colors"
                    >
                      Awesome!
                    </button>
                  </div>
                </div>
              )}

              {/* Bottom Navigation */}
              <nav className="fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center p-3 px-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] max-w-md left-1/2 -translate-x-1/2 rounded-t-3xl z-50">
                <NavItem icon="fa-house" label="Plan" isActive={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                <NavItem icon="fa-calendar-days" label="Days" isActive={activeTab === 'calendar'} onClick={() => setActiveTab('calendar')} />
                <NavItem icon="fa-plus" label="Track" isActive={activeTab === 'tracker'} onClick={() => setActiveTab('tracker')} special />
                <NavItem icon="fa-chart-pie" label="Stats" isActive={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
              </nav>
            </div>
          );
        }

        // --- SUB-COMPONENTS (VIEWS) ---

        const HomeView = ({ budgetLimit, setBudgetLimit, userType, setShowProfileModal }) => {
          const [isEditingBudget, setIsEditingBudget] = useState(false);
          const [tempBudget, setTempBudget] = useState(budgetLimit.toString());

          const handleSaveBudget = () => {
            const val = Number(tempBudget);
            if (val > 0) setBudgetLimit(val);
            setIsEditingBudget(false);
          };

          const handleKeyDown = (e) => {
            if (e.key === 'Enter') handleSaveBudget();
          };

          // Base estimated train pax cost is 3620 (Hotel 2000 + Car 1200 + Train 420)
          const safetyBuffer = budgetLimit - 3620;

          return (
            <div className="space-y-6 fade-in">
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <i className="fa-solid fa-circle-check text-emerald-500 text-xl"></i> Estimated Base Plan
                </h2>
                
                <div className="space-y-4">
                  <div className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                    <span className="font-medium text-slate-600">Max Budget (PP)</span>
                    {isEditingBudget ? (
                      <div className="flex items-center gap-2">
                        <span className="text-slate-500 font-bold">₹</span>
                        <input 
                          type="number" 
                          className="w-20 p-1 border border-slate-300 rounded text-center outline-none focus:border-sky-500" 
                          value={tempBudget} 
                          onChange={e => setTempBudget(e.target.value)} 
                          onKeyDown={handleKeyDown}
                          autoFocus 
                        />
                        <button onClick={handleSaveBudget} className="text-emerald-500 hover:text-emerald-600 bg-emerald-100 w-7 h-7 rounded-full flex items-center justify-center transition-colors">
                          <i className="fa-solid fa-check text-xs"></i>
                        </button>
                      </div>
                    ) : (
                      <span 
                        className="text-lg font-bold text-slate-900 cursor-pointer flex items-center gap-2 px-2 py-1 hover:bg-slate-200 rounded-lg transition-colors" 
                        onClick={() => { setTempBudget(budgetLimit.toString()); setIsEditingBudget(true); }}
                      >
                        ₹{budgetLimit} <i className="fa-solid fa-pen text-[10px] text-slate-400"></i>
                      </span>
                    )}
                  </div>

                  <div className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                    <span className="font-medium text-slate-600">Your Profile</span>
                    <span 
                      className="text-sm font-bold text-sky-600 cursor-pointer bg-sky-100 px-3 py-1.5 rounded-lg hover:bg-sky-200 transition-colors" 
                      onClick={() => setShowProfileModal(true)}
                    >
                      {userType === 'TRAIN_GROUP' ? 'Train Pass. (8) 🚂' : userType === 'DIRECT_GROUP' ? 'Direct Route (2) 🚗' : 'Select Profile'} <i className="fa-solid fa-pen ml-1 text-[10px]"></i>
                    </span>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
                      <i className="fa-solid fa-hotel text-indigo-500 mb-2 text-xl block"></i>
                      <p className="text-xs text-indigo-600 font-semibold uppercase">Hotel</p>
                      <p className="font-bold text-slate-800">₹2,000 <span className="text-[10px] font-normal text-slate-500">PP</span></p>
                    </div>
                    <div className="bg-sky-50 p-3 rounded-xl border border-sky-100">
                      <i className="fa-solid fa-car text-sky-500 mb-2 text-xl block"></i>
                      <p className="text-xs text-sky-600 font-semibold uppercase">Car (Est Max)</p>
                      <p className="font-bold text-slate-800">₹1,200 <span className="text-[10px] font-normal text-slate-500">PP</span></p>
                    </div>
                  </div>

                  <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                    <div className="flex justify-between items-center">
                      <div>
                        <i className="fa-solid fa-train text-emerald-500 mb-1 text-xl"></i>
                        <p className="text-xs text-emerald-600 font-semibold uppercase">Train (8 Pax Only)</p>
                      </div>
                      <p className="font-bold text-slate-800">₹420 <span className="text-[10px] font-normal text-slate-500">PP</span></p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-2xl shadow-md text-white relative overflow-hidden">
                <h3 className="text-slate-300 text-sm font-medium mb-1 relative z-10">Safety Buffer</h3>
                <div className="flex items-end justify-between relative z-10">
                  <div>
                    <p className="text-3xl font-bold">₹{safetyBuffer}</p>
                    <p className="text-xs text-slate-400 mt-1">Available PP for Food, BBQ & Misc</p>
                  </div>
                  <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-sm">
                    <i className="fa-solid fa-fire text-orange-300 text-xl"></i>
                  </div>
                </div>
                <i className="fa-solid fa-utensils absolute -bottom-4 -right-4 text-white/5 text-8xl transform -rotate-12"></i>
              </div>
            </div>
          );
        };

        const CalendarView = ({ onSelectDate, completedTasks, setCompletedTasks, setCongratsDay }) => {
          
          const handleToggle = (dayId, taskId) => {
            const isCompleting = !completedTasks.includes(taskId);
            let newTasks;
            
            if (isCompleting) {
              newTasks = [...completedTasks, taskId];
              // Check if day is fully completed
              const dayTasks = ITINERARY[dayId];
              const allCompleted = dayTasks.every(t => newTasks.includes(t.id));
              
              if (allCompleted) {
                // Fire confetti!
                if (window.confetti) {
                  window.confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#0ea5e9', '#10b981', '#f59e0b', '#8b5cf6'],
                    zIndex: 200
                  });
                }
                setCongratsDay(dayId);
              }
            } else {
              newTasks = completedTasks.filter(id => id !== taskId);
            }
            setCompletedTasks(newTasks);
          };

          return (
            <div className="space-y-5 fade-in">
              <div className="px-1">
                <h2 className="text-xl font-bold text-slate-800">Trip Itinerary & Tasks</h2>
                <p className="text-sm text-slate-500">Track our progress and log daily expenses.</p>
              </div>

              {DATES.map((day, idx) => {
                const dayTasks = ITINERARY[day.id];
                const completedCount = dayTasks.filter(t => completedTasks.includes(t.id)).length;
                const progress = (completedCount / dayTasks.length) * 100;

                return (
                  <div key={day.id} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    {/* Header: Clickable to go to Tracker */}
                    <div 
                      onClick={() => onSelectDate(day.id)}
                      className="p-5 flex items-center justify-between bg-slate-50 border-b border-slate-100 cursor-pointer hover:bg-slate-100 transition-colors"
                    >
                      <div className="flex items-center gap-4">
                        <div className="w-12 h-12 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold text-lg flex-shrink-0">
                          {idx + 1}
                        </div>
                        <div>
                          <h3 className="font-bold text-slate-800">{day.label}</h3>
                          <p className="text-xs text-slate-500 font-medium">Log Expenses <i className="fa-solid fa-chevron-right ml-1 text-[10px]"></i></p>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className="text-xs font-bold text-sky-600 mb-1">{completedCount}/{dayTasks.length} Done</p>
                        <div className="w-16 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                          <div className="h-full bg-sky-500 transition-all duration-500" style={{width: `${progress}%`}}></div>
                        </div>
                      </div>
                    </div>
                    
                    {/* Checklist */}
                    <div className="p-2">
                      {dayTasks.map((task) => {
                        const isChecked = completedTasks.includes(task.id);
                        return (
                          <label key={task.id} className="flex items-start gap-3 p-3 hover:bg-slate-50 rounded-xl cursor-pointer transition-colors">
                            <input 
                              type="checkbox" 
                              className="task-checkbox mt-0.5" 
                              checked={isChecked}
                              onChange={() => handleToggle(day.id, task.id)}
                            />
                            <span className={`text-sm select-none transition-colors duration-300 ${isChecked ? 'text-slate-400 line-through' : 'text-slate-700 font-medium'}`}>
                              {task.text}
                            </span>
                          </label>
                        )
                      })}
                    </div>
                  </div>
                )
              })}
            </div>
          );
        };

        const TrackerView = ({ expenses, setExpenses, selectedDate, setSelectedDate }) => {
          const [form, setForm] = useState({ category: 'FOOD', description: '', amount: '', splitType: 'ALL' });
          const [editingId, setEditingId] = useState(null);
          const [confirmDelete, setConfirmDelete] = useState(null); 

          const handleAmountBlur = () => {
            const calculated = evaluateMath(form.amount);
            if (calculated > 0) {
              setForm({ ...form, amount: calculated.toString() });
            }
          };

          const handleAmountKeyDown = (e) => {
            if (e.key === 'Enter') {
              e.preventDefault(); 
              const calculated = evaluateMath(form.amount);
              if (calculated > 0) {
                setForm({ ...form, amount: calculated.toString() });
              }
            }
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            
            const finalAmount = evaluateMath(form.amount);
            if (finalAmount <= 0) return; 
            
            const finalDescription = form.description.trim() || CATEGORIES.find(c => c.id === form.category).label;
            
            if (editingId) {
              setExpenses(expenses.map(exp => exp.id === editingId ? {
                ...exp,
                category: form.category,
                description: finalDescription,
                amount: finalAmount,
                splitType: form.splitType
              } : exp));
              setEditingId(null);
            } else {
              const newExpense = {
                id: Date.now(),
                date: selectedDate,
                category: form.category,
                description: finalDescription,
                amount: finalAmount,
                splitType: form.splitType
              };
              setExpenses([newExpense, ...expenses]);
            }
            setForm({ category: 'FOOD', description: '', amount: '', splitType: 'ALL' });
          };

          const handleEdit = (exp) => {
            setForm({
              category: exp.category,
              description: exp.description,
              amount: exp.amount.toString(),
              splitType: exp.splitType
            });
            setEditingId(exp.id);
            setConfirmDelete(null); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleDelete = (id) => {
            setExpenses(expenses.filter(exp => exp.id !== id));
            setConfirmDelete(null);
            if (editingId === id) {
              setEditingId(null);
              setForm({ category: 'FOOD', description: '', amount: '', splitType: 'ALL' });
            }
          };

          const cancelEdit = () => {
            setEditingId(null);
            setForm({ category: 'FOOD', description: '', amount: '', splitType: 'ALL' });
          };

          useEffect(() => {
            if (confirmDelete) {
              const timer = setTimeout(() => setConfirmDelete(null), 3000);
              return () => clearTimeout(timer);
            }
          }, [confirmDelete]);

          const dayExpenses = expenses.filter(e => e.date === selectedDate);
          const currentDayLabel = DATES.find(d => d.id === selectedDate)?.label;

          return (
            <div className="space-y-6 fade-in">
              <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                {DATES.map(day => (
                  <button 
                    key={day.id}
                    onClick={() => { setSelectedDate(day.id); cancelEdit(); }}
                    className={`px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors ${
                      selectedDate === day.id ? 'bg-slate-900 text-white' : 'bg-white border border-slate-200 text-slate-600'
                    }`}
                  >
                    {day.label}
                  </button>
                ))}
              </div>

              <div className={`p-5 rounded-2xl shadow-sm border transition-colors ${editingId ? 'bg-sky-50 border-sky-200' : 'bg-white border-slate-100'}`}>
                <h3 className="font-bold text-slate-800 mb-4 flex justify-between items-center">
                  <span>{editingId ? 'Edit Log' : `Log Expense for ${currentDayLabel}`}</span>
                  {editingId && <span className="text-xs font-semibold text-sky-600 bg-sky-100 px-2 py-1 rounded-full"><i className="fa-solid fa-pen mr-1"></i> Editing mode</span>}
                </h3>
                
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs font-semibold text-slate-500 uppercase">Category</label>
                      <select 
                        className="w-full mt-1 p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-sky-500 text-sm transition-colors"
                        value={form.category}
                        onChange={(e) => setForm({...form, category: e.target.value})}
                      >
                        {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-xs font-semibold text-slate-500 uppercase">Amount (₹)</label>
                      <input 
                        type="text" 
                        inputMode="text" 
                        required 
                        placeholder="e.g. 20+40+70"
                        onBlur={handleAmountBlur}
                        onKeyDown={handleAmountKeyDown}
                        className="w-full mt-1 p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-sky-500 text-sm transition-colors font-medium"
                        value={form.amount}
                        onChange={(e) => setForm({...form, amount: e.target.value})}
                      />
                    </div>
                  </div>

                  <div>
                    <label className="text-xs font-semibold text-slate-500 uppercase">Description <span className="text-[10px] text-slate-400 font-normal normal-case">(Optional)</span></label>
                    <input 
                      type="text" 
                      placeholder="What was this for?"
                      className="w-full mt-1 p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-sky-500 text-sm transition-colors"
                      value={form.description}
                      onChange={(e) => setForm({...form, description: e.target.value})}
                    />
                  </div>

                  <div>
                    <label className="text-xs font-semibold text-slate-500 uppercase">Who is paying? (Split)</label>
                    <select 
                      className="w-full mt-1 p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-sky-500 text-sm transition-colors"
                      value={form.splitType}
                      onChange={(e) => setForm({...form, splitType: e.target.value})}
                    >
                      {SPLIT_TYPES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                    </select>
                  </div>

                  <div className="flex gap-2 pt-2">
                    <button type="submit" className="flex-1 py-3 bg-sky-600 hover:bg-sky-700 text-white font-bold rounded-xl shadow-md transition-colors">
                      {editingId ? 'Update Expense' : 'Add Expense'}
                    </button>
                    {editingId && (
                      <button type="button" onClick={cancelEdit} className="py-3 px-5 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl transition-colors">
                        Cancel
                      </button>
                    )}
                  </div>
                </form>
              </div>

              <div>
                <h3 className="text-sm font-bold text-slate-500 uppercase mb-3 px-1">Today's Logs</h3>
                {dayExpenses.length === 0 ? (
                  <p className="text-center text-slate-400 py-6 bg-white rounded-2xl border border-dashed border-slate-200">No expenses logged yet.</p>
                ) : (
                  <div className="space-y-3">
                    {dayExpenses.map(exp => {
                      const cat = CATEGORIES.find(c => c.id === exp.category);
                      const isEditing = editingId === exp.id;
                      return (
                        <div key={exp.id} className={`p-4 rounded-2xl shadow-sm border flex items-center gap-4 transition-colors ${isEditing ? 'bg-sky-50 border-sky-300 ring-1 ring-sky-300' : 'bg-white border-slate-100'}`}>
                          <div className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${cat.bg} ${cat.color}`}>
                            <i className={`fa-solid ${cat.icon}`}></i>
                          </div>
                          <div className="flex-1 overflow-hidden">
                            <h4 className="font-bold text-slate-800 leading-tight truncate">{exp.description}</h4>
                            <p className="text-xs text-slate-400 mt-0.5">{SPLIT_TYPES.find(s=>s.id === exp.splitType)?.label}</p>
                          </div>
                          <div className="text-right flex-shrink-0 flex flex-col justify-between items-end">
                            <p className="font-bold text-slate-900">₹{exp.amount}</p>
                            <div className="flex gap-3 mt-1.5">
                              <button onClick={() => handleEdit(exp)} className="text-slate-300 hover:text-sky-500 transition-colors">
                                <i className="fa-solid fa-pen text-xs"></i>
                              </button>
                              <button 
                                onClick={() => confirmDelete === exp.id ? handleDelete(exp.id) : setConfirmDelete(exp.id)} 
                                className={`transition-colors text-xs font-semibold ${confirmDelete === exp.id ? 'text-red-500' : 'text-slate-300 hover:text-red-400'}`}
                              >
                                {confirmDelete === exp.id ? 'Sure?' : <i className="fa-solid fa-trash"></i>}
                              </button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          );
        };

        const DashboardView = ({ expenses, budgetLimit }) => {
          const stats = useMemo(() => {
            let allShare = 0; let trainShare = 0; let nonTrainShare = 0; let individualShare = 0; let totalSpent = 0;
            let categoryTotals = { HOTEL: 0, CAR: 0, TRAIN: 0, FOOD: 0, MISC: 0 };

            expenses.forEach(exp => {
              totalSpent += exp.amount;
              if (categoryTotals[exp.category] !== undefined) categoryTotals[exp.category] += exp.amount;

              if (exp.splitType === 'ALL') allShare += (exp.amount / 10);
              else if (exp.splitType === 'TRAIN_GROUP') trainShare += (exp.amount / 8);
              else if (exp.splitType === 'DIRECT_GROUP') nonTrainShare += (exp.amount / 2);
              else if (exp.splitType === 'INDIVIDUAL') individualShare += exp.amount;
            });

            const perPersonTrain = Math.round(allShare + trainShare + individualShare);
            const perPersonNoTrain = Math.round(allShare + nonTrainShare + individualShare);
            const mainPercentage = Math.min((perPersonTrain / budgetLimit) * 100, 100);

            return { perPersonTrain, perPersonNoTrain, totalSpent, categoryTotals, mainPercentage };
          }, [expenses, budgetLimit]);

          return (
            <div className="space-y-6 fade-in">
              <div className="bg-slate-900 text-white p-6 rounded-3xl shadow-lg relative overflow-hidden">
                <i className="fa-solid fa-chart-pie absolute -top-4 -right-4 text-white/5 text-9xl"></i>
                
                <h2 className="text-slate-300 text-sm font-medium mb-4 uppercase tracking-wider relative z-10">Per Person Budget Status</h2>
                
                <div className="mb-6 relative z-10">
                  <div className="flex items-center gap-1 mb-2">
                    <div className="w-full h-8 bg-slate-800 rounded-lg p-1 border border-slate-700 relative flex items-center">
                      <div 
                        className={`h-full rounded-md transition-all duration-1000 ${
                          stats.mainPercentage > 85 ? 'bg-red-500' : stats.mainPercentage > 60 ? 'bg-yellow-500' : 'bg-emerald-500'
                        }`}
                        style={{ width: `${stats.mainPercentage}%` }}
                      ></div>
                    </div>
                    <div className="w-1.5 h-4 bg-slate-700 rounded-r-sm"></div>
                  </div>
                  <div className="flex justify-between text-xs text-slate-400">
                    <span>Spent: ₹{stats.perPersonTrain}</span>
                    <span>Max: ₹{budgetLimit}</span>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4 relative z-10">
                  <div className="bg-white/10 p-3 rounded-2xl backdrop-blur-sm">
                    <p className="text-[10px] text-slate-300 uppercase">Train Pass. (8)</p>
                    <p className="text-xl font-bold">₹{stats.perPersonTrain}</p>
                    <p className="text-xs text-emerald-400 mt-1">₹{budgetLimit - stats.perPersonTrain} left</p>
                  </div>
                  <div className="bg-white/10 p-3 rounded-2xl backdrop-blur-sm">
                    <p className="text-[10px] text-slate-300 uppercase">Direct Route (2)</p>
                    <p className="text-xl font-bold">₹{stats.perPersonNoTrain}</p>
                    <p className="text-xs text-emerald-400 mt-1">₹{budgetLimit - stats.perPersonNoTrain} left</p>
                  </div>
                </div>
              </div>

              <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h3 className="font-bold text-slate-800 mb-4">Total Expenses by Category</h3>
                
                <div className="space-y-4">
                  {CATEGORIES.map(cat => {
                    const actualTotal = stats.categoryTotals[cat.id];
                    const estMap = { HOTEL: 20000, CAR: 12000, TRAIN: 3360, FOOD: 10000, MISC: 9640 }; 
                    const estimatedTotal = estMap[cat.id];
                    const percent = Math.min((actualTotal / estimatedTotal) * 100, 100) || 0;
                    
                    return (
                      <div key={cat.id}>
                        <div className="flex justify-between text-xs mb-1">
                          <span className="font-bold text-slate-700 flex items-center gap-1.5">
                            <i className={`fa-solid ${cat.icon} w-3 text-center ${cat.color}`}></i> {cat.label}
                          </span>
                          <span className="text-slate-500">₹{actualTotal} / <span className="text-slate-300">₹{estimatedTotal}</span></span>
                        </div>
                        <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                          <div 
                            className={`h-full rounded-full ${cat.bg.replace('bg-', 'bg-').replace('100', '500')}`} 
                            style={{ width: `${percent}%` }}
                          ></div>
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            </div>
          );
        };

        const NavItem = ({ icon, label, isActive, onClick, special }) => {
          if (special) {
            return (
              <button onClick={onClick} className="relative -top-5 flex flex-col items-center">
                <div className={`w-14 h-14 rounded-full flex items-center justify-center shadow-lg transform transition-transform active:scale-95 ${isActive ? 'bg-sky-600 text-white' : 'bg-slate-900 text-white'}`}>
                  <i className={`fa-solid ${icon} text-xl`}></i>
                </div>
                <span className={`text-[10px] font-bold mt-1 ${isActive ? 'text-sky-600' : 'text-slate-500'}`}>{label}</span>
              </button>
            );
          }

          return (
            <button onClick={onClick} className="flex flex-col items-center gap-1 w-16 transition-colors">
              <i className={`fa-solid ${icon} text-xl ${isActive ? 'text-sky-600' : 'text-slate-400'}`}></i>
              <span className={`text-[10px] font-bold ${isActive ? 'text-sky-600' : 'text-slate-400'}`}>{label}</span>
            </button>
          );
        };

        // Initialize App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
